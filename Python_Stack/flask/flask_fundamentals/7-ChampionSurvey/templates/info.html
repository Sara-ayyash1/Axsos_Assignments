<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submitted Info</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-stone-50 min-h-screen flex items-center justify-center py-12 px-4">

    <div class="bg-white w-full max-w-lg rounded-2xl shadow-sm border border-stone-200 p-10">

        <div class="mb-8">
            <p class="text-xs tracking-widest text-teal-600 uppercase font-medium mb-2">Survey Results</p>
            <h1 class="text-4xl text-stone-800">Submitted Info</h1>
            <div class="w-12 h-0.5 bg-teal-500 mt-3"></div>
        </div>

        <div class="space-y-0 divide-y divide-stone-100">

            <div class="flex justify-between items-center py-4">
                <span class="text-xs font-medium tracking-widest text-stone-400 uppercase">Name</span>
                <span class="text-stone-700 text-sm">{{ session.name }}</span>
            </div>

            <div class="flex justify-between items-center py-4">
                <span class="text-xs font-medium tracking-widest text-stone-400 uppercase">Dojo Location</span>
                <span class="text-stone-700 text-sm">{{ session.location }}</span>
            </div>

            <div class="flex justify-between items-center py-4">
                <span class="text-xs font-medium tracking-widest text-stone-400 uppercase">Favorite Language</span>
                <span class="text-stone-700 text-sm">{{ session.language }}</span>
            </div>

            <div class="flex justify-between items-center py-4">
                <span class="text-xs font-medium tracking-widest text-stone-400 uppercase">Experience Level</span>
                <span class="bg-teal-50 text-teal-700 border border-teal-200 text-xs px-3 py-1 rounded-full">{{ session.level }}</span>
            </div>

            <div class="flex justify-between items-center py-4">
                <span class="text-xs font-medium tracking-widest text-stone-400 uppercase">Comment</span>
                <span class="text-stone-700 text-sm">{{ session.comment if session.comment else '— No comment —' }}</span>
            </div>

        </div>

        <a href="/" class="block mt-8 text-center w-full border border-stone-200 hover:border-teal-400 hover:text-teal-600 text-stone-500 text-sm py-3.5 rounded-xl transition">
            ← Go Back
        </a>

    </div>
</body>
</html>
