<html>
  <head>
    <title>Dojo Fruit Store Assignment</title>
    <link
      rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/bootstrap.css') }}"/>
    <style>
      .fruit-card {
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 16px;
        border: none;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        transition: transform 0.2s;
       
      }
      .fruit-card:hover {
        transform: translateY(-5px);
      }
      .fruit-card img {
        width: 200px;
        height: 200px;
        object-fit: contain;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="navbar navbar-dark bg-dark box-shadow">
        <div class="container d-flex justify-content-between">
          <a href="#" class="navbar-brand d-flex align-items-center">
            <svg xmlns="http://www.w3.org/2000/svg"
              width="20" height="20" viewBox="0 0 24 24"
              fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2" >
              <path
                d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
              <circle cx="12" cy="13" r="4"></circle>
            </svg>
            <strong>Dojo Fruit Store</strong>
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-toggle="collapse"
            data-target="#navbarHeader"
            aria-controls="navbarHeader"
            aria-expanded="false"
            aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
      </div>
    </header>

    <main role="main">
      <div class="container py-5">
        <div class="row justify-content-center">
          <div class="col-6 col-md-3 mb-4">
            <div class="fruit-card card text-center">
              <img
                src="{{ url_for('static', filename='img/apple.png') }}"
                alt="apple"/>
               <div class="card-body pt-0 pb-3">
                <h6 class="font-weight-bold text-dark">Apple</h6>
              </div>
            </div>
          </div>

          <div class="col-6 col-md-3 mb-4">
            <div class="fruit-card card text-center">
              <img
                src="{{ url_for('static', filename='img/blackberry.png') }}"
                alt="blackberry"/>
              <div class="card-body pt-0 pb-3">
                <h6 class="font-weight-bold text-dark">Blackberry</h6>
              </div>
            </div>
          </div>

          <div class="col-6 col-md-3 mb-4">
            <div class="fruit-card card text-center">
              <img
                src="{{ url_for('static', filename='img/raspberry.png') }}"
                alt="raspberry"/>
              <div class="card-body pt-0 pb-3">
                <h6 class="font-weight-bold text-dark">Raspberry</h6>
              </div>
            </div>
          </div>

          <div class="col-6 col-md-3 mb-4">
            <div class="fruit-card card text-center">
              <img
                src="{{ url_for('static', filename='img/strawberry.png') }}"
                alt="strawberry"/>
              <div class="card-body pt-0 pb-3">
                <h6 class="font-weight-bold text-dark">Strawberry</h6>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
