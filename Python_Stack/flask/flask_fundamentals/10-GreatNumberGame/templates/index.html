<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Great Number Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-10 w-full max-w-sm text-center">

    <!-- Title -->
    <h1 class="text-2xl font-semibold text-gray-800 mb-1">Great Number Game</h1>
    <p class="text-sm text-gray-400 mb-6">I'm thinking of a number between 1 and 100...</p>

    <!-- Attempts bar -->
    <div class="mb-6">
      <div class="flex justify-between text-gray-400 mb-1">
        <span>Attempts</span>
        <span>{{ session['attempts'] }} / 5</span>
      </div>
      <div class="w-full bg-gray-100 rounded-full h-2">
        <div class="h-2 rounded-full transition-all duration-300
          {% if session['attempts'] <= 2 %}bg-green-400
          {% elif session['attempts'] <= 4 %}bg-amber-400
          {% else %}bg-red-400{% endif %}"
          style="width: {{ (session['attempts'] / 5 * 100)|int }}%">
        </div>
      </div>
    </div>

    <!-- Message -->
    {% if session['message'] %}
    <div class="rounded-xl py-5 px-4 mb-6
      {% if 'high' in session['message'] %}bg-red-50 border border-red-100
      {% elif 'low' in session['message'] %}bg-blue-50 border border-blue-100
      {% elif 'Correct' in session['message'] or 'was the number' in session['message'] %}bg-green-50 border border-green-100
      {% else %}bg-gray-50 border border-gray-100{% endif %}">

      <p class="text-2xl mb-1
        {% if 'high' in session['message'] %}text-red-400
        {% elif 'low' in session['message'] %}text-blue-400
        {% elif 'Correct' in session['message'] or 'was the number' in session['message'] %}text-green-500
        {% else %}text-gray-500{% endif %}">
      </p>

      <p class="font-medium text-sm
        {% if 'high' in session['message'] %}text-red-600
        {% elif 'low' in session['message'] %}text-blue-600
        {% elif 'Correct' in session['message'] or 'was the number' in session['message'] %}text-green-700
        {% else %}text-gray-600{% endif %}">
        {{ session['message'] }}
      </p>

      {% if session['game_over'] %}
      <a href="/reset">
        <button class="mt-4 bg-gray-800 hover:bg-gray-700 active:scale-95 text-white text-sm font-medium py-2 px-6 rounded-lg transition-all">
          Play again
        </button>
      </a>
      {% endif %}
    </div>
    {% endif %}

    <!-- Guess form -->
    {% if not session['game_over'] %}
    <form action="/process" method="POST">
      <input type="number" name="guessing_num" min="1" max="100" required
        placeholder="Enter a number (1–100)"
        class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-700 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-300 mb-3"/>
      <button type="submit"
        class="w-full bg-gray-800 hover:bg-gray-700 active:scale-95 text-white text-sm font-medium py-2.5 rounded-lg transition-all">
        Guess
      </button>
    </form>
    {% endif %}
  </div>

</body>
</html>
