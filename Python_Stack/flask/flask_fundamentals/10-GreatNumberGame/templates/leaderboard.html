<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Leaderboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-10 w-full max-w-sm">

    <h1 class="text-2xl font-semibold text-gray-800 mb-1 text-center">Leaderboard</h1>
    <p class="text-sm text-gray-400 text-center mb-6">Fewest attempts wins 🏆</p>

    {% if winners %}
    <table class="w-full text-sm">
      <thead>
        <tr class="text-gray-400 border-b">
          <th class="text-left py-2">#</th>
          <th class="text-left py-2">Name</th>
          <th class="text-right py-2">Attempts</th>
        </tr>
      </thead>
      <tbody>
        {% for winner in winners %}
        <tr class="border-b border-gray-50">
          <td class="py-2 text-gray-400">{{ loop.index }}</td>
          <td class="py-2 font-medium text-gray-700">{{ winner.name }}</td>
          <td class="py-2 text-right text-gray-500">{{ winner.attempts }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
      <p class="text-center text-gray-400 text-sm">No winners yet!</p>
    {% endif %}

    <a href="/reset">
      <button class="mt-6 w-full bg-gray-800 hover:bg-gray-700 text-white text-sm font-medium py-2.5 rounded-lg transition-all">
        Play again
      </button>
    </a>
  </div>
</body>
</html>
