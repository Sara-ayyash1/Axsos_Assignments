<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button Clicker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Dojonary</h1>
      <input
        class="searchInput"
        type="text"
        name="searchInput"
        placeholder="Search"
      />
      <button class="loginBtn" onclick="LogOut(this)">Login</button>
    </header>

    <div class="container">
      <div class="main">
        <div class="mainCard">
          <div class="main-contant">
            <h1>ninja</h1>
            <p><em>noun</em></p>
            <p>Plural: <em>ninjas</em></p>
            <button class="likeBtn" onclick="LikedAlert(this)">13 Likes</button>
          </div>
          <div>
            <p>
              A practtictioner skilled in the <a href="#">Japanese</a> art of
              <a href="#">ninjutsu</a>
            </p>
          </div>
        </div>
        <div class="mainCard">
          <div class="main-contant">
            <h1>ninja</h1>
            <p><em>noun</em></p>
            <p>Plural: <em>ninjas</em></p>
            <button class="likeBtn" onclick="LikedAlert(this)">37 Likes</button>
          </div>
          <div>
            <p>
              A <a href="#">Programmer</a> who breaks down problems with
              <a href="#">zen</a>-like focus
            </p>
          </div>
        </div>
      </div>
      <div class="side">
        <p>Dojonary is defined by <span>You</span></p>
        <button class="definitionBtn" onclick="RemoveBtn(this)">
          Add Definition
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
