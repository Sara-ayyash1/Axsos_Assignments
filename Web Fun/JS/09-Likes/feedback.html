<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Likes</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Network</h1>
      </header>

      <div class="sectionTitle">
        <h2>Your Feed</h2>
      </div>
      <div class="main-content">
        <div class="profile-card">
          <img
            class="user-avatar"
            src="static/user-circle.png"
            alt="user avatar"
          />
          <a href="#">Add an avatar</a>
          <p>James Doe</p>
        </div>

        <div class="feeds">
          <div class="post">
            <div class="post-header">
              <h4>Neil M</h4>
              <p><span class="likeCounter">9</span> like(s)</p>
              <button class="likeBtn">Like</button>
            </div>
            <p>
              I just set up this new discord bot, let me Know what you all
              think. <a href="#">link</a>
            </p>
          </div>

          <div class="post">
            <div class="post-header">
              <h4>Nichole K</h4>
              <p><span class="likeCounter">12</span> like(s)</p>
              <button class="likeBtn">Like</button>
            </div>
            <p>Just finished my <a href="#">next comic</a>, check it out.</p>
          </div>

          <div class="post">
            <div class="post-header">
              <h4>Jim R</h4>
              <p><span class="likeCounter">9</span> like(s)</p>
              <button class="likeBtn">Like</button>
            </div>
            <p>
              I can't stop listing to the <a href="#">new album</a>.Who else is
              liking it?
            </p>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
